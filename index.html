<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMAO Proxy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    flex-direction:column;
    color:white;
}

.header{
    padding:20px;
    display:flex;
    justify-content:center;
}

.container{
    width:min(900px,90%);
}

.logo{
    text-align:center;
    font-size:48px;
    font-weight:800;
    background:linear-gradient(90deg,#60a5fa,#818cf8,#c084fc);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    text-align:center;
    opacity:.7;
    margin-top:8px;
}

.search{
    margin-top:30px;
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:18px;
    border:none;
    outline:none;
    border-radius:18px;
    background:rgba(255,255,255,.08);
    color:white;
    backdrop-filter:blur(20px);
    font-size:16px;
}

button{
    border:none;
    padding:18px 28px;
    border-radius:18px;
    cursor:pointer;
    background:linear-gradient(90deg,#3b82f6,#8b5cf6);
    color:white;
    font-size:16px;
    font-weight:600;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

iframe{
    margin:20px;
    flex:1;
    border:none;
    border-radius:20px;
    background:white;
    box-shadow:0 0 40px rgba(0,0,0,.4);
}
</style>
</head>
<body>

<div class="header">
    <div class="container">
        <div class="logo">LMAO Proxy</div>
        <div class="subtitle">
            Fast • Clean • Totally Not A Proxy™
        </div>

        <div class="search">
            <input id="urlBox" placeholder="Enter a URL..." autocomplete="off">
            <button onclick="go()">Go</button>
        </div>
    </div>
</div>

<iframe id="frame"></iframe>

<script>
function go() {
    let url = document.getElementById("urlBox").value.trim();

    if (!url.startsWith("http://") && !url.startsWith("https://")) {
        url = "https://" + url;
    }

    document.getElementById("frame").src = url;
}

document.getElementById("urlBox").addEventListener("keydown", e=>{
    if(e.key==="Enter") go();
});
</script>

</body>
</html>
